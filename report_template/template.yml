jtex: v1
title: 'report_template'
description: 'A plain LaTex template'
version: 1.0.0
license: TODO
authors:
  - name: 'Template Author Name'
tags:
  - paper
parts:
  - id: abstract
    required: true
    description: >
      A good abstract will begin with a short description of the problem being
      addressed, briefly describe the new data or analyses, then briefly states
      the main conclusion(s) and how they are supported and uncertainties.
doc:
  - id: title
    required: true
  - id: authors
    required: true
  - id: bibliography
options:
  - id: draft
    type: boolean
    description: Mark the document as draft
  - id: citationstyle
    type: string
    default: abbrvnat
  - id: showtoc
    type: boolean
    default: false
files:
  - template.tex
packages:
  - amsmath
  - amssymb
  - booktabs
  - datetime
  - graphicx
  - hyperref
  - listing
  - siunitx
  - natbib
